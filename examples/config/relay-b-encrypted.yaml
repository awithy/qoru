node_id: relay-b
mode: server

identity:
  cert: ./dev/certs/relay-b.crt
  key: ./dev/certs/relay-b.key
  ca: ./dev/certs/ca.crt

service_identity:
  ca: ./dev/certs/service-ca.crt

listen: 127.0.0.1:4434

peers:
  - id: relay-a

services:
  - name: echo
    protocol: tcp
    target: 127.0.0.1:9000
    # In E2E mode this authorizes the original ingress client,
    # not the previous-hop relay.
    peers:
      - client-1
    e2e:
      cert: ./dev/certs/relay-b-echo.crt
      key: ./dev/certs/relay-b-echo.key
